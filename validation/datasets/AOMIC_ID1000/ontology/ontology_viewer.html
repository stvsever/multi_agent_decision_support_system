<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>AOMIC-ID1000 (OpenNeuro ds003097) - Ontology Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{--bg:#0b0f17;--panel:#131a26;--border:#243044;--txt:#e6edf6;--muted:#93a2b8;--pri:#6366f1;}
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:Inter,system-ui,Segoe UI,sans-serif}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--border);
    background:var(--panel);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.3px}
  header .sub{color:var(--muted);font-size:12px}
  .controls{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
  button{background:#1b2434;color:var(--txt);border:1px solid var(--border);border-radius:7px;
    padding:7px 12px;font-size:12px;cursor:pointer;font-weight:600}
  button.active{background:var(--pri);border-color:var(--pri);color:#fff}
  button:hover{border-color:var(--pri)}
  input#search{background:#0d1420;border:1px solid var(--border);color:var(--txt);border-radius:7px;
    padding:7px 10px;font-size:12px;width:170px}
  #wrap{display:flex;height:calc(100vh - 55px)}
  #chart{flex:1;overflow:hidden}
  #side{width:290px;border-left:1px solid var(--border);background:var(--panel);padding:16px;overflow:auto}
  #side h2{font-size:13px;margin:0 0 6px;color:var(--pri);text-transform:uppercase;letter-spacing:.6px}
  #side .kind{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:#1b2434;
    color:var(--muted);margin-bottom:8px}
  #side .name{font-size:16px;font-weight:700;margin-bottom:8px}
  #side .def{font-size:13px;color:var(--muted);line-height:1.5}
  #side .path{font-size:11px;color:var(--muted);margin-top:12px;word-break:break-word;font-family:ui-monospace,monospace}
  .link{fill:none;stroke:#33415a;stroke-width:1.3px;opacity:.7}
  .node circle{stroke-width:2px;cursor:pointer}
  .node text{font-size:11px;fill:var(--txt);paint-order:stroke;stroke:var(--bg);stroke-width:3px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}
</style></head>
<body>
<header>
  <h1>AOMIC-ID1000 (OpenNeuro ds003097)</h1><span class="sub">ontology explorer</span>
  <div class="controls">
    <input id="search" placeholder="search feature...">
    <button id="l-td" class="active" onclick="setLayout('td')">Top-down</button>
    <button id="l-lr" onclick="setLayout('lr')">Left-right</button>
    <button id="l-rad" onclick="setLayout('rad')">Radial</button>
    <button onclick="expandAll()">Expand all</button>
    <button onclick="collapseAll()">Collapse</button>
    <button onclick="resetView()">Reset</button>
  </div>
</header>
<div id="wrap">
  <div id="chart"></div>
  <div id="side">
    <h2>Details</h2>
    <div id="d-kind" class="kind">root</div>
    <div id="d-name" class="name">AOMIC-ID1000 (OpenNeuro ds003097)</div>
    <div id="d-def" class="def">Click any node to inspect it. Click a filled node to expand or collapse.</div>
    <div id="d-path" class="path"></div>
    <div class="legend" id="legend"></div>
    <div class="hint">Drag nodes to reposition. Scroll to zoom, drag background to pan.</div>
  </div>
</div>
<script>
const DATA = {"name": "AOMIC_ID1000", "kind": "root", "children": [{"name": "Demographics and Anthropometrics", "id": "DEMOGRAPHICS_AND_ANTHROPOMETRICS", "kind": "domain", "definition": "Basic biological and socio-economic characteristics of the participants, including age, sex, handedness, BMI, education, and background SES.", "children": [{"name": "Biological Traits", "id": "biological_traits", "kind": "subdomain", "definition": "Inherent physiological and physical characteristics of the participant.", "children": [{"name": "Age", "id": "age", "kind": "feature", "definition": "Age of participant in years.", "units": "years"}, {"name": "Biological sex", "id": "sex", "kind": "feature", "definition": "Self-reported biological sex (male/female).", "units": null}, {"name": "Handedness", "id": "handedness", "kind": "feature", "definition": "Left- or right-handed.", "units": null}, {"name": "Body mass index", "id": "BMI", "kind": "feature", "definition": "Body mass index (kg/m^2). Zero values are data errors and treated as missing.", "units": "kg/m^2"}]}, {"name": "Socioeconomic Background", "id": "socioeconomic_background", "kind": "subdomain", "definition": "Indicators of the participant's educational attainment and environmental upbringing.", "children": [{"name": "Education level", "id": "education_level", "kind": "feature", "definition": "Highest completed education level (CBS classification): low/medium/high.", "units": null}, {"name": "Background socio-economic status", "id": "background_SES", "kind": "feature", "definition": "Background SES from parental income and education (range 2-6).", "units": null}]}]}, {"name": "Psychological Constructs", "id": "PSYCHOLOGICAL_CONSTRUCTS", "kind": "domain", "definition": "Self-report questionnaire measures assessing personality traits (NEO-FFI), reinforcement sensitivity (BIS/BAS), and trait anxiety (STAI-T).", "children": [{"name": "Personality Traits", "id": "personality_traits", "kind": "subdomain", "definition": "Aggregate measures of personality traits based on the Five-Factor Model.", "children": [{"name": "Neuroticism (NEO-FFI)", "id": "NEO_N", "kind": "feature", "definition": "NEO-FFI Neuroticism scale (sum of items).", "units": null}, {"name": "Extraversion (NEO-FFI)", "id": "NEO_E", "kind": "feature", "definition": "NEO-FFI Extraversion scale (sum of items).", "units": null}, {"name": "Openness (NEO-FFI)", "id": "NEO_O", "kind": "feature", "definition": "NEO-FFI Openness to experience scale (sum of items).", "units": null}, {"name": "Agreeableness (NEO-FFI)", "id": "NEO_A", "kind": "feature", "definition": "NEO-FFI Agreeableness scale (sum of items).", "units": null}, {"name": "Conscientiousness (NEO-FFI)", "id": "NEO_C", "kind": "feature", "definition": "NEO-FFI Conscientiousness scale (sum of items).", "units": null}]}, {"name": "Reinforcement Sensitivity", "id": "reinforcement_sensitivity", "kind": "subdomain", "definition": "Component-level measures of behavioral activation and inhibition systems.", "children": [{"name": "BAS drive", "id": "BAS_drive", "kind": "feature", "definition": "Behavioural Activation System drive subscale.", "units": null}, {"name": "BAS fun-seeking", "id": "BAS_fun", "kind": "feature", "definition": "Behavioural Activation System fun-seeking subscale.", "units": null}, {"name": "BAS reward responsiveness", "id": "BAS_reward", "kind": "feature", "definition": "Behavioural Activation System reward responsiveness subscale.", "units": null}, {"name": "Behavioural inhibition (BIS)", "id": "BIS", "kind": "feature", "definition": "Behavioural Inhibition System scale.", "units": null}]}, {"name": "Trait Anxiety", "id": "trait_anxiety", "kind": "subdomain", "definition": "Aggregate measure of stable individual differences in anxiety proneness.", "children": [{"name": "Trait anxiety (STAI-T)", "id": "STAI_T", "kind": "feature", "definition": "State-Trait Anxiety Inventory, trait subscale.", "units": null}]}]}, {"name": "Identity and Belief Systems", "id": "IDENTITY_AND_BELIEF_SYSTEMS", "kind": "domain", "definition": "Self-reported measures regarding sexual attraction, gender identity, and religious affiliation or importance.", "children": [{"name": "Sexual and Gender Identity", "id": "sexual_and_gender_identity", "kind": "subdomain", "definition": "Self-reported measures quantifying sexual attraction and internal gender identity.", "children": [{"name": "Sexual attraction to males", "id": "sexual_attraction_M", "kind": "feature", "definition": "Degree of sexual attraction to males (1-7).", "units": null}, {"name": "Sexual attraction to females", "id": "sexual_attraction_F", "kind": "feature", "definition": "Degree of sexual attraction to females (1-7).", "units": null}, {"name": "Gender identity (male)", "id": "gender_identity_M", "kind": "feature", "definition": "Degree to which the subject felt male (1-7).", "units": null}, {"name": "Gender identity (female)", "id": "gender_identity_F", "kind": "feature", "definition": "Degree to which the subject felt female (1-7).", "units": null}]}, {"name": "Religious Affiliation and Importance", "id": "religious_affiliation_and_importance", "kind": "subdomain", "definition": "Self-reported measures regarding religious history, current status, and personal significance of religion.", "children": [{"name": "Religious upbringing", "id": "religious_upbringing", "kind": "feature", "definition": "Whether the subject had a religious upbringing (yes/no).", "units": null}, {"name": "Currently religious", "id": "religious_now", "kind": "feature", "definition": "Whether the subject is religious now (yes/no).", "units": null}, {"name": "Importance of religion", "id": "religious_importance", "kind": "feature", "definition": "How much religion plays a role in the subject's life (1-5).", "units": null}]}]}, {"name": "Structural Brain Morphometry", "id": "STRUCTURAL_BRAIN_MORPHOMETRY", "kind": "domain", "definition": "Quantitative anatomical measures derived from structural MRI, including global volumetric summaries and regional subcortical volumes and cortical thickness.", "children": [{"name": "Global Volumetric Summaries", "id": "global_volumetric_summaries", "kind": "subdomain", "definition": "Aggregate anatomical measures representing total brain tissue and intracranial space volumes.", "children": [{"name": "Estimated total intracranial volume", "id": "fs_etiv", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Total brain segmentation volume", "id": "fs_brainseg_vol", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Total gray matter volume", "id": "fs_total_gray_vol", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Total cortical gray matter volume", "id": "fs_cortex_vol", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Total cerebral white matter volume", "id": "fs_cerebral_wm_vol", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Total subcortical gray matter volume", "id": "fs_subcort_gray_vol", "kind": "feature", "definition": "", "units": "mm^3"}]}, {"name": "Subcortical Regional Volumes", "id": "subcortical_regional_volumes", "kind": "subdomain", "definition": "Quantitative volumes of specific subcortical gray matter structures segmented by hemisphere.", "children": [{"name": "Left hippocampus volume", "id": "fs_vol_lh_hippocampus", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right hippocampus volume", "id": "fs_vol_rh_hippocampus", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left amygdala volume", "id": "fs_vol_lh_amygdala", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right amygdala volume", "id": "fs_vol_rh_amygdala", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left thalamus volume", "id": "fs_vol_lh_thalamus", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right thalamus volume", "id": "fs_vol_rh_thalamus", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left caudate volume", "id": "fs_vol_lh_caudate", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right caudate volume", "id": "fs_vol_rh_caudate", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left putamen volume", "id": "fs_vol_lh_putamen", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right putamen volume", "id": "fs_vol_rh_putamen", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left pallidum volume", "id": "fs_vol_lh_pallidum", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right pallidum volume", "id": "fs_vol_rh_pallidum", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left accumbens volume", "id": "fs_vol_lh_accumbens", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right accumbens volume", "id": "fs_vol_rh_accumbens", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Left ventraldc volume", "id": "fs_vol_lh_ventraldc", "kind": "feature", "definition": "", "units": "mm^3"}, {"name": "Right ventraldc volume", "id": "fs_vol_rh_ventraldc", "kind": "feature", "definition": "", "units": "mm^3"}]}, {"name": "Cortical Thickness Measures", "id": "cortical_thickness_measures", "kind": "subdomain", "definition": "Regional and hemispheric mean cortical thickness estimates derived from structural MRI.", "children": [{"name": "Left hemisphere mean cortical thickness", "id": "fs_mean_thickness_lh", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Left frontal lobe cortical thickness", "id": "fs_thk_lh_frontal", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Left parietal lobe cortical thickness", "id": "fs_thk_lh_parietal", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Left temporal lobe cortical thickness", "id": "fs_thk_lh_temporal", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Left occipital lobe cortical thickness", "id": "fs_thk_lh_occipital", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Left cingulate lobe cortical thickness", "id": "fs_thk_lh_cingulate", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Left insula lobe cortical thickness", "id": "fs_thk_lh_insula", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right hemisphere mean cortical thickness", "id": "fs_mean_thickness_rh", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right frontal lobe cortical thickness", "id": "fs_thk_rh_frontal", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right parietal lobe cortical thickness", "id": "fs_thk_rh_parietal", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right temporal lobe cortical thickness", "id": "fs_thk_rh_temporal", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right occipital lobe cortical thickness", "id": "fs_thk_rh_occipital", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right cingulate lobe cortical thickness", "id": "fs_thk_rh_cingulate", "kind": "feature", "definition": "", "units": "mm"}, {"name": "Right insula lobe cortical thickness", "id": "fs_thk_rh_insula", "kind": "feature", "definition": "", "units": "mm"}]}]}, {"name": "Functional Brain Connectivity", "id": "FUNCTIONAL_BRAIN_CONNECTIVITY", "kind": "domain", "definition": "Measures of functional synchronization between Yeo brain networks during movie-watching fMRI, represented as Pearson correlation coefficients.", "children": [{"name": "Within-network functional connectivity", "id": "within_network_synchrony", "kind": "subdomain", "definition": "Measures of functional synchronization within individual Yeo brain networks during movie-watching.", "children": [{"name": "Visual within-network FC", "id": "fc_vis_within", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Somatomotor within-network FC", "id": "fc_sommot_within", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Dorsal attention within-network FC", "id": "fc_dorsattn_within", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Salience / ventral attention within-network FC", "id": "fc_salventattn_within", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Limbic within-network FC", "id": "fc_limbic_within", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Frontoparietal control within-network FC", "id": "fc_cont_within", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Default mode within-network FC", "id": "fc_default_within", "kind": "feature", "definition": "", "units": "Pearson r"}]}, {"name": "Between-network functional connectivity", "id": "between_network_synchrony", "kind": "subdomain", "definition": "Measures of functional synchronization between distinct pairs of Yeo brain networks during movie-watching.", "children": [{"name": "Visual - Somatomotor FC", "id": "fc_vis_sommot", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Visual - Dorsal attention FC", "id": "fc_vis_dorsattn", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Visual - Salience / ventral attention FC", "id": "fc_vis_salventattn", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Visual - Limbic FC", "id": "fc_vis_limbic", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Visual - Frontoparietal control FC", "id": "fc_vis_cont", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Visual - Default mode FC", "id": "fc_vis_default", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Somatomotor - Dorsal attention FC", "id": "fc_sommot_dorsattn", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Somatomotor - Salience / ventral attention FC", "id": "fc_sommot_salventattn", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Somatomotor - Limbic FC", "id": "fc_sommot_limbic", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Somatomotor - Frontoparietal control FC", "id": "fc_sommot_cont", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Somatomotor - Default mode FC", "id": "fc_sommot_default", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Dorsal attention - Salience / ventral attention FC", "id": "fc_dorsattn_salventattn", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Dorsal attention - Limbic FC", "id": "fc_dorsattn_limbic", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Dorsal attention - Frontoparietal control FC", "id": "fc_dorsattn_cont", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Dorsal attention - Default mode FC", "id": "fc_dorsattn_default", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Salience / ventral attention - Limbic FC", "id": "fc_salventattn_limbic", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Salience / ventral attention - Frontoparietal control FC", "id": "fc_salventattn_cont", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Salience / ventral attention - Default mode FC", "id": "fc_salventattn_default", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Limbic - Frontoparietal control FC", "id": "fc_limbic_cont", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Limbic - Default mode FC", "id": "fc_limbic_default", "kind": "feature", "definition": "", "units": "Pearson r"}, {"name": "Frontoparietal control - Default mode FC", "id": "fc_cont_default", "kind": "feature", "definition": "", "units": "Pearson r"}]}]}]};
const palette = d3.schemeCategory10;
let layout = 'td';
const chart = document.getElementById('chart');
let W = chart.clientWidth || 900, H = chart.clientHeight || 640;
const svg = d3.select('#chart').append('svg').attr('width', W).attr('height', H);
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.2, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const root = d3.hierarchy(DATA);
root.x0 = H/2; root.y0 = 0;
let domainColor = {};
root.children && root.children.forEach((d,i)=> domainColor[d.data.id||d.data.name] = palette[i%10]);
function colorOf(d){ let n=d; while(n.depth>1) n=n.parent; return n.depth===1 ? domainColor[n.data.id||n.data.name] : '#6366f1'; }
function collapse(d){ if(d.children){ d._children=d.children; d._children.forEach(collapse); d.children=null; } }
root.children && root.children.forEach(d => d.children && d.children.forEach(s => { /* keep 2 levels open */ }));
// start: domains + subdomains open, features collapsed
root.descendants().forEach(d=>{ if(d.depth>=2 && d.children){ d._children=d.children; d.children=null; }});

const legend = d3.select('#legend');
(root.children||[]).forEach(d=>{ legend.append('span').html(
  `<span class="dot" style="background:${domainColor[d.data.id||d.data.name]}"></span>${d.data.name}`); });

function setLayout(l){ layout=l; ['td','lr','rad'].forEach(k=>document.getElementById('l-'+k).classList.toggle('active',k===l)); update(root); resetView(); }

function tree(){
  if(layout==='rad') return d3.tree().size([2*Math.PI, Math.min(W,H)/2-90]).separation((a,b)=>(a.parent==b.parent?1:2)/a.depth);
  if(layout==='lr') return d3.tree().nodeSize([26, 200]);
  return d3.tree().nodeSize([150, 90]);
}
function project(d){
  if(layout==='rad'){ const a=d.x-Math.PI/2, r=d.y; return [Math.cos(a)*r, Math.sin(a)*r]; }
  if(layout==='lr') return [d.y, d.x];
  return [d.x, d.y];
}
const linkGen = ()=> layout==='rad'
  ? d3.linkRadial().angle(d=>d.x).radius(d=>d.y)
  : d3.linkHorizontal().x(d=>layout==='lr'?d.y:d.x).y(d=>layout==='lr'?d.x:d.y);

function update(source){
  const t = tree(); t(root);
  const nodes = root.descendants(), links = root.links();
  const dur = 400;

  const link = g.selectAll('path.link').data(links, d=>d.target.data.id||d.target.data.name);
  link.enter().append('path').attr('class','link').merge(link).transition().duration(dur)
    .attr('d', d=>{
      if(layout==='rad') return linkGen()(d);
      const s=project(d.source), t2=project(d.target);
      return `M${s[0]},${s[1]}C${(s[0]+t2[0])/2},${s[1]} ${(s[0]+t2[0])/2},${t2[1]} ${t2[0]},${t2[1]}`;
    });
  link.exit().remove();

  const node = g.selectAll('g.node').data(nodes, d=>d.data.id||d.data.name);
  const nEnter = node.enter().append('g').attr('class','node')
    .attr('transform', d=>{const p=project(source); return `translate(${p[0]},${p[1]})`;})
    .on('click',(e,d)=>{ select(d); if(d.children){d._children=d.children;d.children=null;} else if(d._children){d.children=d._children;d._children=null;} update(d); })
    .call(d3.drag().on('drag',function(e,d){ if(layout==='rad')return; d.x=(layout==='lr')?e.y:e.x; d.y=(layout==='lr')?e.x:e.y; d3.select(this).attr('transform',`translate(${project(d)[0]},${project(d)[1]})`); redrawLinks(); }));
  nEnter.append('circle').attr('r',0);
  nEnter.append('text').attr('dy','0.31em').text(d=>d.data.name)
    .attr('x',d=>d.children||d._children?-10:10).attr('text-anchor',d=>d.children||d._children?'end':'start');

  const nAll = nEnter.merge(node);
  nAll.transition().duration(dur).attr('transform', d=>{const p=project(d); return `translate(${p[0]},${p[1]})`;});
  nAll.select('circle').transition().duration(dur).attr('r', d=>d.depth===0?7:d.depth===1?9:d.depth===2?6:4)
    .attr('fill', d=> (d._children? colorOf(d): (d.depth===3?'#0d1420':colorOf(d))))
    .attr('stroke', d=>colorOf(d));
  nAll.select('text').attr('opacity', d=> d.depth<=2 || layout!=='td' ? 1 : 0.85)
    .attr('x',d=>d.children||d._children?-11:11).attr('text-anchor',d=>d.children||d._children?'end':'start');
  node.exit().transition().duration(dur).attr('transform',`translate(${project(source)[0]},${project(source)[1]})`).remove();

  nodes.forEach(d=>{d.x0=d.x;d.y0=d.y;});
}
function redrawLinks(){
  g.selectAll('path.link').attr('d', d=>{
    if(layout==='rad') return linkGen()(d);
    const s=project(d.source), t2=project(d.target);
    return `M${s[0]},${s[1]}C${(s[0]+t2[0])/2},${s[1]} ${(s[0]+t2[0])/2},${t2[1]} ${t2[0]},${t2[1]}`;});
}
function select(d){
  document.getElementById('d-kind').textContent = d.data.kind||'node';
  document.getElementById('d-name').textContent = d.data.name;
  document.getElementById('d-def').textContent = d.data.definition || (d.data.units?('units: '+d.data.units):'No definition.');
  document.getElementById('d-path').textContent = d.ancestors().reverse().map(a=>a.data.name).join('  >  ');
}
function expandAll(){ root.each(d=>{ if(d._children){d.children=d._children;d._children=null;} }); update(root); }
function collapseAll(){ root.descendants().forEach(d=>{ if(d.depth>=1 && d.children){d._children=d.children;d.children=null;} }); update(root); }
function resetView(){ const k=layout==='td'?0.75:0.7; svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(layout==='rad'?W/2:(layout==='lr'?110:W/2), layout==='rad'?H/2:(layout==='lr'?H/2:70)).scale(k)); }
document.getElementById('search').addEventListener('input', e=>{
  const q=e.target.value.toLowerCase();
  g.selectAll('g.node').select('circle').attr('stroke-width', d=> q && (d.data.name.toLowerCase().includes(q)) ? 4:2)
    .attr('fill', d=> q && d.data.name.toLowerCase().includes(q) ? '#f59e0b' : (d._children?colorOf(d):(d.depth===3?'#0d1420':colorOf(d))));
});
function remeasure(){ W=chart.clientWidth||W; H=chart.clientHeight||H; svg.attr('width',W).attr('height',H); resetView(); }
window.addEventListener('resize', remeasure);
update(root); resetView();
// Re-measure once the flex layout has settled (chart width can be 0 at parse time).
requestAnimationFrame(remeasure); setTimeout(remeasure, 120);
</script>
</body></html>
